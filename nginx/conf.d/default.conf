# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name luravanti.com www.luravanti.com;
    return 301 https://$host$request_uri;
}

# HTTPS → Next.js frontend
server {
    listen 443 ssl;
    server_name luravanti.com www.luravanti.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    location / {
        proxy_pass         http://frontend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache Next.js static assets aggressively (content-hashed filenames)
    location /_next/static/ {
        proxy_pass http://frontend:4000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache public assets
    location /public/ {
        proxy_pass http://frontend:4000/public/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
